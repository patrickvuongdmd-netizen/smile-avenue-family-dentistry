<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="/favicon.ico" sizes="32x32" />
    <link rel="icon" href="/favicon-192.png" type="image/png" sizes="192x192" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <title>Smile Avenue Family Dentistry | Dentist in Cypress & Katy, TX</title>
    <meta name="description" content="Smile Avenue Family Dentistry — your trusted family dentist in Cypress and Katy, TX. 5,000+ five-star reviews. Same-day appointments. Book online today." />

    <!-- Preconnect to external hosts for faster resource loading -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://www.smileavenuefamilydentistry.com" />
    <link rel="preconnect" href="https://img.youtube.com" />
    <link rel="preconnect" href="https://book.modento.io" />
    <link rel="preconnect" href="https://www.localmarketingmanager.com" />

    <!-- Preload hero logo mark for LCP -->
    <link rel="preload" as="image" href="/logo-mark.webp" type="image/webp" />

    <!-- Preload Google Fonts to avoid render-blocking CSS @import -->
    <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@500;600;700&family=Playfair+Display:wght@400;500;600;700&family=Lora:wght@400;500;600&family=Inter:wght@300;400;500;600;700&display=swap" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@500;600;700&family=Playfair+Display:wght@400;500;600;700&family=Lora:wght@400;500;600&family=Inter:wght@300;400;500;600;700&display=swap" media="print" onload="this.media='all'" />
    <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@500;600;700&family=Playfair+Display:wght@400;500;600;700&family=Lora:wght@400;500;600&family=Inter:wght@300;400;500;600;700&display=swap" /></noscript>

    <!-- DNS prefetch for YouTube embeds -->
    <link rel="dns-prefetch" href="https://www.youtube-nocookie.com" />
    <meta name="author" content="Smile Avenue Family Dentistry" />

    <meta property="og:title" content="Smile Avenue Family Dentistry | Dentist in Cypress & Katy, TX" />
    <meta property="og:description" content="Smile Avenue Family Dentistry — your trusted family dentist in Cypress and Katy, TX. 5,000+ five-star reviews. Same-day appointments." />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="https://www.smileavenuefamilydentistry.com/og-image.webp" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@smileavenuetx" />
    <meta name="twitter:image" content="https://www.smileavenuefamilydentistry.com/og-image.webp" />

    <!-- Google Ads gtag.js — uncomment and replace with your Google Ads account ID
    <script async src="https://www.googletagmanager.com/gtag/js?id=AW-XXXXXXXXX"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'AW-XXXXXXXXX');
    </script>
    -->
  </head>
  <body>
    <div id="root">
      <!-- Inline skeleton shown until React mounts (< 1KB, no external requests) -->
      <style>
        .sa-skeleton{display:flex;flex-direction:column;min-height:100vh;background:#fefdfb;font-family:Inter,sans-serif}
        .sa-sk-nav{height:72px;display:flex;align-items:center;justify-content:space-between;padding:0 24px;border-bottom:1px solid #e5e7eb}
        .sa-sk-logo{width:160px;height:36px;border-radius:6px;background:linear-gradient(90deg,#f0f0f0 25%,#e0e0e0 50%,#f0f0f0 75%);background-size:200% 100%;animation:sa-shimmer 1.5s infinite}
        .sa-sk-hero{flex:1;max-height:480px;display:flex;align-items:center;justify-content:center;padding:48px 24px}
        .sa-sk-hero-inner{text-align:center;max-width:640px;width:100%}
        .sa-sk-line{height:16px;border-radius:8px;margin:12px auto;background:linear-gradient(90deg,#f0f0f0 25%,#e0e0e0 50%,#f0f0f0 75%);background-size:200% 100%;animation:sa-shimmer 1.5s infinite}
        .sa-sk-line.lg{height:32px;width:70%;margin-bottom:20px}
        .sa-sk-line.md{width:50%}
        .sa-sk-line.sm{width:35%}
        .sa-sk-btn{width:200px;height:48px;border-radius:12px;margin:24px auto 0;background:linear-gradient(90deg,#d1ecf1 25%,#b8e0e8 50%,#d1ecf1 75%);background-size:200% 100%;animation:sa-shimmer 1.5s infinite}
        @keyframes sa-shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
      </style>
      <div class="sa-skeleton" aria-hidden="true">
        <div class="sa-sk-nav"><div class="sa-sk-logo"></div></div>
        <div class="sa-sk-hero"><div class="sa-sk-hero-inner">
          <div class="sa-sk-line lg"></div>
          <div class="sa-sk-line md"></div>
          <div class="sa-sk-line sm"></div>
          <div class="sa-sk-btn"></div>
        </div></div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
